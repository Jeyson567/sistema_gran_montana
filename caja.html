<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caja - Gran Montana POS</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="encabezado">

  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
    <span id="usuarioNombre">Bienvenido</span>
    <button id="btnLogout" style="padding:8px 12px;border:none;border-radius:8px;background:#b33232;color:white;cursor:pointer;">
      Cerrar sesión
    </button>
  </div>

  <h1>💰 Caja</h1>
  <a class="boton-pequeno" href="mesas.html">Volver</a>
</header>

<main class="caja-contenido">
  <section class="card-caja">
    <div class="caja-header">
      <h2 id="cajaMesa">Mesa</h2>
      <span class="caja-badge">Cobro</span>
    </div>

    <div class="caja-total-box">
      <p class="caja-label">Total a pagar</p>
      <p id="cajaTotal" class="caja-total-valor">Q0</p>
    </div>

    <div class="caja-metodos">
      <h3>Método de pago</h3>

      <div class="caja-botones-metodo">
        <button class="btn-metodo" data-metodo="efectivo">💵 Efectivo</button>
        <button class="btn-metodo" data-metodo="tarjeta">💳 Tarjeta</button>
      </div>
    </div>

    <button id="btnConfirmarPago" class="btn-confirmar">Confirmar pago</button>
  </section>
</main>

<script type="module" src="js/auth-guard.js"></script>
<script type="module" src="js/user-ui.js"></script>
<script type="module" src="js/app.js"></script>

</body>
</html>
